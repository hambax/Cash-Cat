# Manual builds, tag releases: macOS (Apple Silicon + optional Intel) + Windows (NSIS .exe).
# Push tag `v*` to publish installers on GitHub Releases; manual runs upload Actions artefacts.
name: Build installers

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            rust_target: aarch64-apple-darwin
            bundles: "app,dmg"
            artifact_name: cash-cat-macos-arm64
          - os: windows-latest
            rust_target: x86_64-pc-windows-msvc
            bundles: "nsis"
            artifact_name: cash-cat-windows-x64

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install NSIS (Windows)
        if: runner.os == 'Windows'
        run: choco install nsis -y

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install dependencies (npm)
        run: npm ci

      - name: Align app versions
        run: npm run check-versions

      - name: Install engine test dependencies & run pytest
        run: |
          cd engine
          python -m pip install -q -r requirements.txt
          python -m pytest -q

      - name: Typecheck frontend
        run: npm run typecheck

      - name: Build Tauri app (sidecar + frontend)
        run: npx tauri build --target ${{ matrix.rust_target }} --bundles ${{ matrix.bundles }}

      - name: Assert sidecar exists (bundle / target)
        shell: bash
        run: |
          set -e
          # Tauri may place the external binary as `cash-cat-engine-<triple>` or plain `cash-cat-engine[.exe]`.
          if find src-tauri/target -type f \( -name 'cash-cat-engine' -o -name 'cash-cat-engine.exe' -o -name 'cash-cat-engine-*' \) 2>/dev/null | head -1 | grep -q .; then
            echo "Found engine sidecar under src-tauri/target"
            find src-tauri/target -type f \( -name 'cash-cat-engine' -o -name 'cash-cat-engine.exe' -o -name 'cash-cat-engine-*' \) 2>/dev/null | head -10
          else
            echo "No cash-cat-engine sidecar found under src-tauri/target"
            find src-tauri/target -name 'cash-cat-engine*' 2>/dev/null | head -30 || true
            exit 1
          fi

      - name: Smoke test sidecar
        run: bash scripts/ci-smoke-sidecar.sh

      - name: List bundle outputs (debug)
        shell: bash
        run: |
          set -e
          find src-tauri/target -path "*/bundle/*" -type f \( -name "*.dmg" -o -name "*.exe" -o -name "*.app" \) 2>/dev/null | head -50 || true

      - name: Upload macOS artefact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: src-tauri/target/**/release/bundle/**/*.dmg
          if-no-files-found: error

      - name: Upload Windows artefact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: src-tauri/target/**/release/bundle/nsis/*.exe
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artefacts
        uses: actions/download-artifact@v4
        with:
          pattern: cash-cat-*
          path: rel
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          files: rel/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
